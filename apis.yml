aid: big-o-notation
name: Big O Notation
description: >-
  Big O Notation is a mathematical notation used in computer science to describe
  the performance or complexity of algorithms, providing a way to classify
  algorithms by how their runtime or space requirements grow as input size grows.
  It is foundational to algorithm design, API performance benchmarking, and
  software engineering education.
